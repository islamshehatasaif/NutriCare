<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriCare AI · Physician</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><div class="logo">غ</div><span data-t="appName">NutriCare AI</span></div>
      <nav class="nav" id="nav">
        <a data-page="dashboard" class="active">📊 <span data-t="dashboard">Dashboard</span></a>
        <a data-page="patients">👥 <span data-t="patients">Patients</span></a>
        <a data-page="risk">🎯 <span data-t="risk">Risk Prediction</span></a>
        <a data-page="aibot">🤖 <span data-t="aiBot">AI Assistant</span></a>
        <a data-page="foods">🍽️ <span data-t="foods">Food Database</span></a>
        <a data-page="modules">🏥 <span data-t="modules">Disease Modules</span></a>
        <a data-page="appointments">📅 <span data-t="appointments">Appointments</span></a>
      </nav>
      <p class="disclaimer" data-t="disclaimer"></p>
    </aside>

    <main class="main">
      <div class="topbar">
        <div><h2 id="pageTitle" data-t="dashboard">Dashboard</h2><span class="muted" id="who"></span></div>
        <div class="row" style="gap:8px">
          <button class="btn btn-sm" id="langBtn">العربية</button>
          <button class="btn btn-sm" id="themeBtn">🌙</button>
          <button class="btn btn-sm" id="logout" data-t="signOut">Sign out</button>
        </div>
      </div>
      <div id="content"></div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script>
  const { t, api, esc, riskGauge, requireAuth } = NC;
  const u = requireAuth('physician'); if (u) document.getElementById('who').textContent = u.name;
  const C = document.getElementById('content');
  let PATIENTS = [], MODULES = {};

  langBtn.onclick = () => { const n = NC.getLang() === 'en' ? 'ar' : 'en'; NC.setLang(n); langBtn.textContent = n === 'en' ? 'العربية' : 'English'; render(); };
  themeBtn.onclick = NC.toggleTheme; logout.onclick = NC.logout;
  NC.onLangChange = () => { document.getElementById('pageTitle').textContent = t(current); };

  document.getElementById('nav').addEventListener('click', e => {
    const a = e.target.closest('a'); if (!a) return;
    document.querySelectorAll('.nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active'); current = a.dataset.page; document.getElementById('pageTitle').textContent = t(current); render();
  });
  let current = 'dashboard';
  let detailId = null; // set while viewing a patient profile

  // Background sync: refresh the open patient's live widgets in place (never
  // navigate away from the detail view); otherwise refresh the current list.
  NC.connectSocket((ev, d) => {
    if (detailId) { refreshDetail(d); return; }
    if (ev === 'adherence-updated' || ev === 'notification') {
      if (current === 'dashboard') { loadAdherenceBoard(); NC.toast(t('notifications')+' ↻', 'info', 1800); }
      return;
    }
    if (['patient-updated','patient-activity','patient-deleted','assessment-saved','appointment-created','appointment-updated','message'].includes(ev)) {
      if (current === 'dashboard' || current === 'patients') loadAndRender();
    }
  });
  function refreshDetail(d) {
    if (!detailId) return;
    if (d && d.patientId && d.patientId !== detailId) return; // unrelated patient
    if (document.getElementById('msgs')) loadMessages(detailId);
    if (document.getElementById('asmtList')) loadAssessments(detailId);
    if (document.getElementById('dnList')) loadDoctorNotes(detailId);
    if (document.getElementById('fuList')) loadFollowups(detailId);
  }

  async function loadAndRender() { PATIENTS = await api('/patients'); render(); }
  async function render() {
    detailId = null; // leaving any detail view
    if (current === 'dashboard') return renderDashboard();
    if (current === 'patients') return renderPatients();
    if (current === 'risk') return renderRisk();
    if (current === 'aibot') return renderAiBot();
    if (current === 'foods') return renderFoods();
    if (current === 'modules') return renderModules();
    if (current === 'appointments') return renderAppointments();
  }

  function tierBadge(r) { return `<span class="badge tier-${r.tier.key}">${r.score} · ${t(r.tier.key) || r.tier.label}</span>`; }

  async function renderDashboard() {
    const s = await api('/dashboard/stats');
    const tiers = s.riskTiers;
    C.innerHTML = `
      <div class="kpis">
        <div class="card kpi"><div class="v">${s.totalPatients}</div><div class="l" data-t="totalPatients">Total Patients</div></div>
        <div class="card kpi"><div class="v" style="color:var(--high)">${s.highRisk}</div><div class="l" data-t="highRisk">High-Risk</div></div>
        <div class="card kpi"><div class="v">${s.avgAdherence}%</div><div class="l" data-t="adherence">Avg Adherence</div></div>
        <div class="card kpi"><div class="v">${s.neonatal}</div><div class="l" data-t="neonatal">Neonatal</div></div>
        <div class="card kpi"><div class="v">${s.upcomingAppointments}</div><div class="l" data-t="appointments">Appointments</div></div>
      </div>
      <div class="row">
        <div class="card grow" style="min-width:300px">
          <h3 data-t="riskScore">Malnutrition Risk distribution</h3>
          ${['low','moderate','high','critical'].map(k => {
            const n = tiers[k], pct = s.totalPatients ? Math.round(n/s.totalPatients*100):0;
            return `<div style="margin:10px 0"><div style="display:flex;justify-content:space-between;font-size:13px"><span class="badge tier-${k}">${t(k)||k}</span><b>${n}</b></div>
              <div style="height:8px;background:var(--surface-2);border-radius:6px;overflow:hidden;margin-top:5px"><div style="width:${pct}%;height:100%;background:var(--${k})"></div></div></div>`;
          }).join('')}
        </div>
        <div class="card grow" style="min-width:300px">
          <h3 data-t="modules">Disease Modules</h3>
          ${Object.entries(s.diseaseBreakdown).map(([k,v]) => `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><span>${esc(k)}</span><b>${v}</b></div>`).join('')}
        </div>
      </div>
      <div class="row" style="margin-top:16px">
        <div class="card grow" style="min-width:320px">
          <h3>📊 <span data-t="ranking">Adherence ranking</span></h3>
          <div id="adhRank"><p class="muted">…</p></div>
        </div>
        <div class="card grow" style="min-width:300px">
          <h3 style="color:var(--high)">⚠ <span data-t="nonCompliant">Non-compliant patients</span></h3>
          <div id="nonComp"></div>
          <h3 style="margin-top:14px">🔔 <span data-t="notifications">Notifications</span></h3>
          <div id="notif" style="max-height:200px;overflow:auto"></div>
        </div>
      </div>`;
    NC.setLang(NC.getLang());
    loadAdherenceBoard();
  }
  async function loadAdherenceBoard() {
    const [d, notifs] = await Promise.all([api('/dashboard/adherence'), api('/notifications')]);
    const rank = document.getElementById('adhRank'); if (!rank) return;
    rank.innerHTML = `<table><thead><tr><th data-t="name">Name</th><th data-t="adherence">Score</th><th>Trend</th></tr></thead><tbody>
      ${d.ranking.map(r=>`<tr><td>${esc(r.name)} <span class="muted" style="font-size:11px">${esc(r.module||'')}</span></td>
        <td><span class="badge tier-${r.category==='High'?'low':r.category==='Medium'?'moderate':'critical'}">${r.score}%</span></td>
        <td style="color:${r.trend>=0?'var(--low)':'var(--critical)'}">${r.trend>=0?'▲':'▼'} ${Math.abs(r.trend)}</td></tr>`).join('')}
      </tbody></table><div class="muted" style="font-size:12px;margin-top:6px">Avg ${d.avg}%</div>`;
    document.getElementById('nonComp').innerHTML = d.nonCompliant.length
      ? d.nonCompliant.map(x=>`<div class="explain" style="border-inline-start-color:var(--critical)"><b>${esc(x.name)}</b> — ${x.score}% <span class="badge tier-critical">${x.category}</span></div>`).join('')
      : `<p class="muted">${t('noData')}</p>`;
    document.getElementById('notif').innerHTML = notifs.length
      ? notifs.slice(0,8).map(n=>`<div class="explain" style="${n.read?'':'border-inline-start-color:var(--accent)'}"><div style="font-size:13px">${esc(n.body)}</div><div class="muted" style="font-size:11px">${new Date(n.ts).toLocaleString()}</div></div>`).join('')
      : `<p class="muted">${t('noData')}</p>`;
    NC.setLang(NC.getLang());
  }

  const PT = { search: '', filter: '', sort: 'name', dir: 1, page: 1, size: 8 };
  async function renderPatients() {
    PATIENTS = await api('/patients');
    C.innerHTML = `
      <div class="toolbar">
        <input id="pSearch" data-tph="search" value="${esc(PT.search)}" style="min-width:220px"/>
        <select id="pFilter">
          <option value="" data-t="allRisk">All risk levels</option>
          <option value="critical">Critical</option><option value="high">High</option>
          <option value="moderate">Moderate</option><option value="low">Low</option>
        </select>
        <select id="pSort">
          <option value="name" data-t="name">Name</option>
          <option value="risk" data-t="riskScore">Risk score</option>
          <option value="adherence" data-t="adherence">Adherence</option>
          <option value="updated">Latest assessment</option>
        </select>
        <span class="grow"></span>
        <button class="btn btn-sm" id="pExport">⬇ <span data-t="exportCsv">Export CSV</span></button>
        <button class="btn btn-primary" id="addPatientBtn">➕ <span data-t="addPatient">Add Patient</span></button>
      </div>
      <div class="card"><table><thead><tr>
        <th class="sortable" data-sort="name" data-t="name">Name</th><th data-t="ageBmi">Age/BMI</th>
        <th data-t="module">Module</th><th class="sortable" data-sort="risk" data-t="riskScore">Risk</th>
        <th class="sortable" data-sort="adherence" data-t="adherence">Adh.</th><th></th></tr></thead>
        <tbody id="pBody"></tbody></table>
        <div class="pager" id="pPager"></div>
      </div>`;
    document.getElementById('pFilter').value = PT.filter;
    document.getElementById('pSort').value = PT.sort;
    NC.setLang(NC.getLang());
    drawPatientRows();
    document.getElementById('pSearch').oninput = (e) => { PT.search = e.target.value; PT.page = 1; drawPatientRows(); };
    document.getElementById('pFilter').onchange = (e) => { PT.filter = e.target.value; PT.page = 1; drawPatientRows(); };
    document.getElementById('pSort').onchange = (e) => { PT.sort = e.target.value; drawPatientRows(); };
    C.querySelectorAll('th.sortable').forEach(th => th.onclick = () => {
      const s = th.dataset.sort; PT.dir = (PT.sort === s) ? -PT.dir : 1; PT.sort = s; drawPatientRows();
    });
    document.getElementById('addPatientBtn').onclick = () => patientModal(null);
    document.getElementById('pExport').onclick = () => NC.exportCSV('patients.csv', filteredPatients().map(p => ({
      Name: p.name, Code: p.patientCode, Age: p.ageDisplay, Gender: p.gender, BMI: p.bmi,
      Module: p.diseaseModule, Diagnosis: p.diagnosis, RiskScore: p.assessment.risk.score,
      RiskTier: p.assessment.risk.tier.label, Adherence: p.adherence,
    })));
  }
  function filteredPatients() {
    let list = PATIENTS.slice();
    if (PT.search) { const q = PT.search.toLowerCase(); list = list.filter(p => (p.name + ' ' + (p.patientCode||'') + ' ' + (p.diagnosis||'')).toLowerCase().includes(q)); }
    if (PT.filter) list = list.filter(p => p.assessment.risk.tier.key === PT.filter);
    const key = PT.sort;
    list.sort((a, b) => {
      let av, bv;
      if (key === 'risk') { av = a.assessment.risk.score; bv = b.assessment.risk.score; }
      else if (key === 'adherence') { av = a.adherence||0; bv = b.adherence||0; }
      else if (key === 'updated') { av = a.updatedAt||''; bv = b.updatedAt||''; }
      else { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
      return av < bv ? -PT.dir : av > bv ? PT.dir : 0;
    });
    return list;
  }
  function drawPatientRows() {
    const all = filteredPatients();
    const pages = Math.max(1, Math.ceil(all.length / PT.size));
    if (PT.page > pages) PT.page = pages;
    const slice = all.slice((PT.page-1)*PT.size, PT.page*PT.size);
    document.getElementById('pBody').innerHTML = slice.length ? slice.map(p => `<tr data-id="${p.id}">
      <td><b>${esc(p.name)}</b><div class="muted" style="font-size:12px">${esc(p.patientCode||'')}</div></td>
      <td>${esc(p.ageDisplay||'-')} · ${p.bmi||'-'}</td>
      <td>${esc(p.diseaseModule||'-')}${p.neonatal?' 👶':''}</td>
      <td>${tierBadge(p.assessment.risk)}</td>
      <td>${p.adherence||0}%</td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm pView" data-t="viewPatient">View</button>
        <button class="btn btn-sm pEdit" title="Edit">✏️</button>
        <button class="btn btn-sm pDel" title="Delete">🗑️</button></td></tr>`).join('')
      : `<tr><td colspan="6" class="muted" style="text-align:center;padding:24px">${t('noData')}</td></tr>`;
    document.getElementById('pPager').innerHTML = all.length > PT.size
      ? `<button class="btn btn-sm" id="pPrev" ${PT.page<=1?'disabled':''}>‹</button>
         <span>${PT.page} / ${pages} · ${all.length}</span>
         <button class="btn btn-sm" id="pNext" ${PT.page>=pages?'disabled':''}>›</button>` : `<span class="muted">${all.length} ${t('patients').toLowerCase()}</span>`;
    NC.setLang(NC.getLang());
    document.querySelectorAll('#pBody tr[data-id]').forEach(tr => {
      const id = tr.dataset.id;
      tr.querySelector('.pView').onclick = () => openPatient(id);
      tr.querySelector('.pEdit').onclick = (e) => { e.stopPropagation(); const p = PATIENTS.find(x=>x.id===id); patientModal(p); };
      tr.querySelector('.pDel').onclick = async (e) => { e.stopPropagation(); const p = PATIENTS.find(x=>x.id===id);
        if (await NC.confirmDialog(`${t('deleteConfirm')} "${p.name}"?`, { title: t('addPatient') })) {
          await api('/patients/'+id, { method:'DELETE' }); NC.toast(t('deleted'), 'success'); renderPatients();
        }};
    });
    const prev = document.getElementById('pPrev'), next = document.getElementById('pNext');
    if (prev) prev.onclick = () => { PT.page--; drawPatientRows(); };
    if (next) next.onclick = () => { PT.page++; drawPatientRows(); };
  }

  // Add / Edit patient as a real modal (validation, inline errors, loading)
  function patientModal(p) {
    const isEdit = !!p;
    const m = NC.modal(`
      <div class="row">
        <div class="field grow"><label data-t="name">Name *</label><input id="np_name" value="${esc(p?.name||'')}" ${isEdit?'disabled':''}/><div class="err" id="e_name"></div></div>
        <div class="field grow"><label data-t="dob">Date of birth *</label><input type="date" id="np_dob" value="${esc(p?.birthday||'')}" ${isEdit?'disabled':''}/><div class="err" id="e_dob"></div></div>
        <div class="field"><label>Gender</label><select id="np_gender"><option value="male" ${p?.gender==='male'?'selected':''}>male</option><option value="female" ${p?.gender==='female'?'selected':''}>female</option></select></div>
      </div>
      <div class="row">
        <div class="field grow"><label data-t="height">Height (cm)</label><input type="number" id="np_h" value="${p?.heightCm??''}"/></div>
        <div class="field grow"><label data-t="weight">Weight (kg)</label><input type="number" id="np_w" value="${p?.weightKg??''}"/><div class="muted" id="bmiHint" style="font-size:12px;margin-top:4px"></div></div>
        <div class="field grow"><label data-t="diseaseModule">Disease module</label>
          <select id="np_mod"><option value="">${t('none')}</option>${['CKD','Hepatic','Hyperlipidemia','IEM'].map(x=>`<option ${p?.diseaseModule===x?'selected':''}>${x}</option>`).join('')}</select></div>
      </div>
      <div class="row">
        <div class="field grow"><label>Diagnosis</label><input id="np_dx" value="${esc(p?.diagnosis||'')}"/></div>
        <div class="field grow"><label>Medications (comma-separated)</label><input id="np_meds" value="${esc(p?.medications||'')}" placeholder="Lisinopril, Atorvastatin"/></div>
      </div>
      <div class="row">
        <div class="field grow"><label data-t="weightLoss">Weight loss %</label><input type="number" id="np_wl" value="${p?.weightLossPct??0}"/></div>
        <div class="field grow"><label data-t="intakePct">Intake %</label><input type="number" id="np_in" value="${p?.intakePctOfNeeds??100}"/></div>
        <div class="field grow"><label data-t="albumin">Albumin</label><input type="number" step="0.1" id="np_alb" value="${p?.albumin??''}"/></div>
        <div class="field grow"><label>eGFR</label><input type="number" id="np_egfr" value="${p?.egfr??''}"/></div>
      </div>
      <h4 style="margin:6px 0" data-t="lifestylePillars">Lifestyle & vitals</h4>
      <div class="row">
        <div class="field grow"><label data-t="activityLevel">Activity level</label>
          <select id="np_act">${['','sedentary','light','moderate','active'].map(x=>`<option value="${x}" ${p?.activityLevel===x?'selected':''}>${x||'—'}</option>`).join('')}</select></div>
        <div class="field grow"><label data-t="dietType">Diet type</label><input id="np_diet" value="${esc(p?.dietType||'')}"/></div>
        <div class="field grow"><label data-t="sleepHours">Sleep (hrs)</label><input type="number" step="0.5" id="np_sleep" value="${p?.sleepHours??''}"/></div>
        <div class="field grow"><label data-t="waterGoal">Water goal (ml)</label><input type="number" id="np_water" value="${p?.waterGoalMl??2000}"/></div>
      </div>
      <div class="row">
        <div class="field grow"><label data-t="bloodPressure">Blood pressure</label>
          <div class="row" style="gap:4px"><input type="number" id="np_sys" placeholder="Sys" value="${p?.systolic??''}"/><input type="number" id="np_dia" placeholder="Dia" value="${p?.diastolic??''}"/></div></div>
        <div class="field grow"><label data-t="bloodSugar">Blood sugar</label><input type="number" id="np_sugar" value="${p?.bloodSugar??''}"/></div>
        <div class="field grow"><label data-t="stress">Stress (0–10)</label><input type="number" min="0" max="10" id="np_stress" value="${p?.stressLevel??''}"/></div>
      </div>
      <div class="row">
        <div class="field grow"><label data-t="smoking">Smoking</label>
          <select id="np_smoke">${['','never','former','current'].map(x=>`<option value="${x}" ${p?.smoking===x?'selected':''}>${x||'—'}</option>`).join('')}</select></div>
        <div class="field grow"><label data-t="alcohol">Alcohol</label>
          <select id="np_alc">${['','none','occasional','regular'].map(x=>`<option value="${x}" ${p?.alcohol===x?'selected':''}>${x||'—'}</option>`).join('')}</select></div>
        <div class="field grow"><label>Family history</label><input id="np_fam" value="${esc(p?.familyHistory||'')}"/></div>
        <div class="field grow"><label>Allergies</label><input id="np_alg" value="${esc(p?.allergies||'')}"/></div>
      </div>
      <div class="row" style="justify-content:flex-end;gap:8px;margin-top:6px">
        <button class="btn nc-cancel" data-t="cancel">Cancel</button>
        <button class="btn btn-primary" id="np_save">${isEdit ? t('save') : t('createPatient')}</button>
      </div>`, { title: isEdit ? esc(p.name) : t('addPatient') });
    NC.setLang(NC.getLang());
    const bmiHint = m.body.querySelector('#bmiHint');
    const calcBmi = () => { const h=+m.body.querySelector('#np_h').value, w=+m.body.querySelector('#np_w').value;
      if (h>0&&w>0){ const b=(w/((h/100)**2)).toFixed(1); bmiHint.textContent = `BMI ${b}`; } else bmiHint.textContent=''; };
    m.body.querySelector('#np_h').oninput = calcBmi; m.body.querySelector('#np_w').oninput = calcBmi; calcBmi();
    m.body.querySelector('.nc-cancel').onclick = m.close;
    m.body.querySelector('#np_save').onclick = async (e) => {
      m.body.querySelectorAll('.err').forEach(x=>x.textContent='');
      const name = m.body.querySelector('#np_name').value.trim(), dob = m.body.querySelector('#np_dob').value;
      let bad = false;
      if (!isEdit && !name) { m.body.querySelector('#e_name').textContent = t('required'); bad = true; }
      if (!isEdit && !dob) { m.body.querySelector('#e_dob').textContent = t('required'); bad = true; }
      if (bad) { NC.toast(t('fixErrors'), 'error'); return; }
      const q = (id) => m.body.querySelector(id).value;
      const body = { gender: q('#np_gender'), heightCm: q('#np_h'),
        weightKg: q('#np_w'), diseaseModule: q('#np_mod') || null,
        diagnosis: q('#np_dx'), medications: q('#np_meds'),
        weightLossPct: q('#np_wl'), intakePctOfNeeds: q('#np_in'),
        albumin: q('#np_alb'), egfr: q('#np_egfr'),
        activityLevel: q('#np_act') || null, dietType: q('#np_diet'), sleepHours: q('#np_sleep') || null,
        waterGoalMl: q('#np_water') || null, systolic: q('#np_sys') || null, diastolic: q('#np_dia') || null,
        bloodSugar: q('#np_sugar') || null, stressLevel: q('#np_stress') || null,
        smoking: q('#np_smoke') || null, alcohol: q('#np_alc') || null,
        familyHistory: q('#np_fam'), allergies: q('#np_alg') };
      await NC.withLoading(e.target, async () => {
        try {
          if (isEdit) { await api('/patients/'+p.id, { method:'PUT', body }); NC.toast(t('saved'), 'success'); }
          else { body.name = name; body.birthday = dob; await api('/patients', { method:'POST', body }); NC.toast(t('createdPatient'), 'success'); }
          m.close(); renderPatients();
        } catch (err) { NC.toast(err.message, 'error'); }
      });
    };
  }

  async function renderAiBot() {
    PATIENTS = await api('/patients');
    C.innerHTML = `<div class="card">
      <div class="row" style="gap:8px;align-items:center;margin-bottom:12px">
        <h3 style="margin:0">🤖 <span data-t="aiBot">AI Assistant</span></h3>
        <span class="grow"></span>
        <select id="aiPatient" style="max-width:280px"><option value="">${t('selectPatientFirst')}</option>
          ${PATIENTS.map(p=>`<option value="${p.id}">${esc(p.name)} — ${esc(p.diseaseModule||'-')}</option>`).join('')}</select>
      </div>
      <div id="aiChat" style="max-height:48vh;overflow:auto;margin-bottom:10px"></div>
      <div class="row" style="gap:6px">
        <input id="aiMsg" data-tph="askPhysicianAI" class="grow"/>
        <button class="btn btn-primary" id="aiSend" data-t="send">Send</button>
      </div>
      <div class="row" style="gap:6px;margin-top:8px">
        ${['malnutrition risk','interpret labs','nutrient targets','foods to avoid','draft ADIME note'].map(q=>`<button class="chip aiQuick">${q}</button>`).join('')}

        <p class="muted" style="font-size:13px;margin-top:10px"><b>Key labs:</b> ${(m.keyLabs||[]).join(', ')}</p>
        ${m.stages?`<p style="font-size:13px"><b>Stages:</b> ${m.stages.map(s=>s.stage).join(', ')}</p>`:''}
        ${m.types?`<p style="font-size:13px"><b>Types:</b> ${m.types.map(x=>x.key).join(', ')}</p>`:''}
        ${m.critical?`<span class="badge tier-critical">Critical · neonatal screening</span>`:''}
      </div>`).join('')}</div>`;
  }

  async function renderAppointments() {
    const a = await api('/appointments');
    C.innerHTML = `<div class="card"><table><thead><tr><th>Patient</th><th data-t="when">When</th><th data-t="reason">Reason</th><th>Status</th></tr></thead><tbody>
      ${a.map(x=>{const p=PATIENTS.find(p=>p.id===x.patient_id);return `<tr><td>${esc(p?p.name:x.patient_id)}</td><td>${new Date(x.when_ts).toLocaleString()}</td><td>${esc(x.reason)}</td><td><span class="badge tier-low">${esc(x.status)}</span></td></tr>`;}).join('')||`<tr><td colspan=4 class="muted">${t('noData')}</td></tr>`}
    </tbody></table></div>`;
    NC.setLang(NC.getLang());
  }

  async function printReport(id) {
    const rep = await api('/patients/'+id+'/report');
    const p = rep.patient, r = rep.assessment.risk, tg = rep.assessment.targets;
    const w = window.open('', '_blank');
    w.document.write(`<html><head><title>Report — ${esc(p.name)}</title>
      <style>body{font-family:Inter,sans-serif;padding:30px;color:#1a2233;max-width:800px;margin:auto}
      h1{color:#0d9488}.box{border:1px solid #e4e9f2;border-radius:12px;padding:16px;margin:12px 0}
      table{width:100%;border-collapse:collapse}td,th{padding:6px;border-bottom:1px solid #eee;text-align:left}
      .badge{padding:3px 10px;border-radius:99px;background:#0d948822;color:#0d9488;font-weight:700}</style></head><body>
      <h1>NutriCare AI — Clinical Nutrition Report</h1>
      <p><b>${esc(p.name)}</b> · ${esc(p.patientCode||'')} · ${esc(p.ageDisplay||'')} · ${esc(p.gender||'')}<br/>${esc(p.diagnosis||'')}</p>
      <div class="box"><h3>Executive Summary</h3>Malnutrition risk <span class="badge">${r.score}/100 · ${r.tier.label}</span> — ${esc(r.explanation)}</div>
      <div class="box"><h3>Anthropometrics</h3>Weight ${p.weightKg} kg · Height ${p.heightCm} cm · BMI ${p.bmi}</div>
      <div class="box"><h3>Nutrition Targets</h3><table>
        <tr><td>Energy</td><td>${tg.energyKcal} kcal/day</td></tr><tr><td>Protein</td><td>${tg.proteinG} g/day</td></tr>
        <tr><td>Sodium</td><td>&lt;${tg.sodiumMg} mg</td></tr>${tg.potassiumMg?`<tr><td>Potassium</td><td>&lt;${tg.potassiumMg} mg</td></tr>`:''}
        ${tg.phosphorusMg?`<tr><td>Phosphorus</td><td>&lt;${tg.phosphorusMg} mg</td></tr>`:''}<tr><td>Fluid</td><td>${esc(tg.fluid)}</td></tr></table></div>
      <div class="box"><h3>ADIME Note</h3><pre style="white-space:pre-wrap;font-family:inherit">${esc(rep.adime.text)}</pre></div>
      <p style="color:#64748b;font-size:12px">${esc(NC.t('disclaimer'))} · Generated ${new Date().toLocaleString()}</p>
      </body></html>`);
    w.document.close(); setTimeout(()=>w.print(), 400);
  }

  loadAndRender();
  </script>
</body>
</html>
