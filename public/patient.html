<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriCare AI · Patient</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .pwrap{max-width:520px;margin:0 auto;padding:14px 14px 90px}
    .tabbar{position:fixed;bottom:0;inset-inline:0;max-width:520px;margin:0 auto;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0}
    .tabbar a{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;color:var(--muted);font-weight:600;cursor:pointer;padding:4px 10px;border-radius:10px}
    .tabbar a.active{color:var(--primary);background:color-mix(in srgb,var(--primary) 12%,transparent)}
    .ring{--p:0;width:120px;height:120px;border-radius:50%;background:conic-gradient(var(--primary) calc(var(--p)*1%),var(--surface-2) 0);display:grid;place-items:center}
    .ring .in{width:92px;height:92px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}
  </style>
</head>
<body>
  <div class="pwrap">
    <div class="topbar">
      <div class="brand" style="padding:0"><div class="logo">غ</div><span id="hi"></span></div>
      <div class="row" style="gap:6px">
        <button class="btn btn-sm" id="langBtn">عربي</button>
        <button class="btn btn-sm" id="themeBtn">🌙</button>
        <button class="btn btn-sm" id="logout">⎋</button>
      </div>
    </div>
    <div id="content"></div>
  </div>

  <nav class="tabbar" id="tabs">
    <a data-page="home" class="active">🏠<span data-t="dashboard">Home</span></a>
    <a data-page="score">💯<span data-t="adherenceTab">Score</span></a>
    <a data-page="plan">🍽️<span data-t="myPlan">Plan</span></a>
    <a data-page="meds">💊<span data-t="medsTab">Meds</span></a>
    <a data-page="log">➕<span data-t="logFood">Log</span></a>
    <a data-page="assistant">🤖<span data-t="assistant">AI</span></a>
    <a data-page="messages">💬<span data-t="messages">Chat</span></a>
  </nav>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
  <script>
  const { t, api, esc, riskGauge, requireAuth } = NC;
  const u = requireAuth('patient');
  const PID = u ? u.patientId : null;
  let P = null, current = 'home';
  if (u) document.getElementById('hi').textContent = u.name.split(' ')[0];

  langBtn.onclick = () => { const n = NC.getLang()==='en'?'ar':'en'; NC.setLang(n); langBtn.textContent = n==='en'?'عربي':'EN'; render(); };
  themeBtn.onclick = NC.toggleTheme; logout.onclick = NC.logout;

  document.getElementById('tabs').addEventListener('click', e => {
    const a = e.target.closest('a'); if(!a) return;
    document.querySelectorAll('.tabbar a').forEach(x=>x.classList.remove('active')); a.classList.add('active');
    current = a.dataset.page; render();
  });
  NC.connectSocket((ev,d)=>{ if(ev==='message' && current==='messages') loadMsgs(); if(ev==='patient-updated') load(); });

  const C = document.getElementById('content');
  async function load(){ P = await api('/patients/'+PID); render(); }
  function render(){
    if(current==='home') return home();
    if(current==='score') return adherence();
    if(current==='plan') return plan();
    if(current==='meds') return meds();
    if(current==='log') return logPage();
    if(current==='assistant') return assistant();
    if(current==='messages') return messages();
  }

  function home(){
    const r = P.assessment.risk, tgt = P.assessment.targets, waterGoal = 2000;
    C.innerHTML = `<div class="card page" style="text-align:center">
      <h3 data-t="dailyGoals">Daily Goals</h3>
      <div class="row" style="justify-content:center;gap:24px;margin:10px 0">
        <div><div class="ring" style="--p:${P.adherence||0}"><div class="in"><div><b style="font-size:22px">${P.adherence||0}%</b><div class="muted" style="font-size:11px" data-t="adherence">Adherence</div></div></div></div></div>
        <div style="text-align:center">${riskGauge(r.score, r.tier.key)}<div class="muted" style="font-size:12px" data-t="riskScore">Risk</div></div>
      </div>
      <span class="badge tier-${r.tier.key}">${r.tier.label}</span>
    </div>
    <div class="card page" style="margin-top:12px">
      <h3 data-t="nutritionInputs">Nutrition Targets</h3>
      <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
        <div><div class="l" data-t="energyTarget">Energy</div><b>${tgt.energyKcal}</b><div class="l">kcal/day</div></div>
        <div><div class="l" data-t="proteinTarget">Protein</div><b>${tgt.proteinG} g</b><div class="l">${tgt.proteinGperKg} g/kg</div></div>
        <div><div class="l" data-t="carbs">Carbs</div><b>${tgt.carbsG} g</b></div>
        <div><div class="l" data-t="fat">Fat</div><b>${tgt.fatG} g</b></div>
        <div><div class="l" data-t="fiber">Fiber</div><b>${tgt.fiberG} g</b></div>
        <div><div class="l" data-t="satFatLbl">Saturated fat</div><b>&lt;${tgt.satFatG} g</b></div>
        <div><div class="l" data-t="sodium">Sodium</div><b>&lt;${tgt.sodiumMg} mg</b></div>
        ${tgt.potassiumMg?`<div><div class="l" data-t="potassium">Potassium</div><b>&lt;${tgt.potassiumMg} mg</b></div>`:''}
        ${tgt.phosphorusMg?`<div><div class="l" data-t="phosphorus">Phosphorus</div><b>&lt;${tgt.phosphorusMg} mg</b></div>`:''}
        <div><div class="l" data-t="fluid">Fluid</div><b style="font-size:15px">${esc(tgt.fluid)}</b></div>
      </div>
    </div>
    <div class="card page" style="margin-top:12px">
      <h3>💧 <span data-t="water">Water</span> & <span data-t="exercise">Exercise</span></h3>
      <div class="row" style="gap:8px;margin-bottom:10px">
        <button class="btn btn-sm" onclick="addWater(250)">+250ml</button>
        <button class="btn btn-sm" onclick="addWater(500)">+500ml</button>
        <span class="grow"></span>
        <button class="btn btn-sm btn-primary" id="logEx">+ <span data-t="exercise">Exercise</span></button>
      </div>
      <div id="todayLogs" class="muted" style="font-size:13px"></div>
    </div>
    <p class="disclaimer" data-t="disclaimer"></p>`;
    NC.setLang(NC.getLang());
    document.getElementById('logEx').onclick = async()=>{ await api('/patients/'+PID+'/exercise',{method:'POST',body:{type:'Cardio',duration:30,intensity:'Moderate',calories:200}}); loadToday(); };
    loadToday();
  }
  window.addWater = async (ml)=>{ await api('/patients/'+PID+'/water',{method:'POST',body:{volumeMl:ml}}); loadToday(); };
  async function loadToday(){
    const l = await api('/patients/'+PID+'/logs');
    const water = l.water.reduce((s,x)=>s+(x.volume_ml||0),0);
    const el = document.getElementById('todayLogs'); if(!el) return;
    el.innerHTML = `💧 ${water} ml · 🏃 ${l.exercise.length} ${t('exercise')} · 🍽️ ${l.food.length} ${t('logFood')}`;
  }

  // ── AI Health Adherence Calculator ───────────────────────────────
  let lastAdh = null;
  function adhGauge(score, cat){
    const col = cat==='High'?'var(--low)':cat==='Medium'?'var(--moderate)':'var(--critical)';
    const r=56,c=2*Math.PI*r,off=c-(score/100)*c;
    return `<div class="gauge"><svg width="150" height="150">
      <circle cx="75" cy="75" r="${r}" fill="none" stroke="var(--border)" stroke-width="12"/>
      <circle id="adhArc" cx="75" cy="75" r="${r}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${c}" style="transition:stroke-dashoffset 1.1s ease"/>
      </svg><div class="num" id="adhNum" style="color:${col}">0</div></div>`;
  }
  function trendChart(points){
    if(!points.length) return `<p class="muted">${t('noData')}</p>`;
    const w=300,h=90,pad=6; const xs=points.map((_,i)=>pad+i*(w-2*pad)/Math.max(1,points.length-1));
    const ys=points.map(p=>h-pad-(p.overall/100)*(h-2*pad));
    const path=xs.map((x,i)=>`${i?'L':'M'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
    const last=points[points.length-1];
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:90px">
      <polyline points="${xs.map((x,i)=>x+','+ys[i]).join(' ')}" fill="none" stroke="var(--primary)" stroke-width="2"/>
      ${xs.map((x,i)=>`<circle cx="${x}" cy="${ys[i]}" r="2.5" fill="var(--primary)"/>`).join('')}
    </svg><div class="muted" style="font-size:12px;text-align:center">${points.length} ${t('dataPoints')} · ${t('latest')}: ${last.overall}%</div>`;
  }
  async function adherence(){
    C.innerHTML = `<div class="card page" style="text-align:center">
      <h3>💯 <span data-t="adherenceTitle">Health Adherence</span></h3>
      <p class="muted" style="font-size:13px" data-t="adherenceSub">Weighted score from food, exercise, medication & lifestyle.</p>
      <div id="adhResult"></div>
      <button class="btn btn-primary" id="calcBtn" style="margin-top:8px">⚡ <span data-t="calcAdherence">Calculate Adherence</span></button>
    </div>
    <div class="card page" style="margin-top:12px"><h3 data-t="trend">Adherence Trend</h3><div id="adhTrend"></div></div>
    <p class="disclaimer" data-t="disclaimer"></p>`;
    NC.setLang(NC.getLang());
    loadTrend();
    document.getElementById('calcBtn').onclick = (e)=>NC.withLoading(e.target, runCalc);
  }
  async function loadTrend(){
    const hist = await api('/patients/'+PID+'/adherence/history');
    const el=document.getElementById('adhTrend'); if(el) el.innerHTML = trendChart(hist);
  }
  async function runCalc(){
    const out=document.getElementById('adhResult');
    const steps=['Pulling food logs','Reading exercise data','Checking medication intake','Scoring lifestyle goals','Weighting final score'];
    out.innerHTML=`<ul class="ai-steps" style="text-align:start;max-width:300px;margin:10px auto">${steps.map((s,i)=>`<li id="ast${i}"><span class="dot">${i+1}</span>${s}</li>`).join('')}</ul>`;
    for(let i=0;i<steps.length;i++){ await new Promise(r=>setTimeout(r,240)); document.getElementById('ast'+i)?.classList.add('done'); }
    const { result } = await api('/patients/'+PID+'/adherence', { method:'POST' });
    lastAdh = result;
    const cards=[['food','🍽️','nutritionAdh'],['exercise','🏃','exerciseAdh'],['medication','💊','medicationAdh'],['lifestyle','🌙','lifestyleAdh']];
    out.innerHTML = `${adhGauge(result.overall, result.category)}
      <div><span class="badge tier-${result.category==='High'?'low':result.category==='Medium'?'moderate':'critical'}">${result.category}</span></div>
      <div class="kpis" style="grid-template-columns:repeat(2,1fr);margin-top:12px">
        ${cards.map(([k,ic,lbl])=>`<div style="text-align:start">
          <div class="l">${ic} <span data-t="${lbl}">${k}</span> · ${result.weights[k]}%</div>
          <b>${result[k]}%</b>
          <div style="height:7px;background:var(--surface-2);border-radius:5px;overflow:hidden;margin-top:4px"><div style="width:${result[k]}%;height:100%;background:var(--primary);transition:width .8s"></div></div>
          <div class="muted" style="font-size:11px">${esc(result.breakdown[k].reason)}</div>
        </div>`).join('')}
      </div>
      <div class="explain" style="text-align:start;margin-top:12px"><b>🧠 <span data-t="aiInsights">AI Insights</span></b>
        <ul style="margin:6px 0;padding-inline-start:18px">${result.insights.map(i=>`<li style="font-size:13px;margin:3px 0">${esc(i)}</li>`).join('')}</ul></div>
      <div class="row" style="gap:6px;margin-top:10px;justify-content:center">
        <button class="btn btn-sm" id="aRecalc">🔄 <span data-t="recalculate">Recalculate</span></button>
        <button class="btn btn-sm" id="aHistory">📜 <span data-t="viewHistory">History</span></button>
        <button class="btn btn-sm" id="aCompare">📊 <span data-t="compare">Compare</span></button>
        <button class="btn btn-sm" id="aPdf">📄 PDF</button>
        <button class="btn btn-sm" id="aCsv">⬇ CSV</button>
        <button class="btn btn-sm btn-primary" id="aSend">📨 <span data-t="sendDoctor">Send to doctor</span></button>
      </div>`;
    NC.setLang(NC.getLang());
    // animate gauge fill 0→score
    requestAnimationFrame(()=>{ const arc=document.getElementById('adhArc'); const c=2*Math.PI*56; if(arc) arc.style.strokeDashoffset=c-(result.overall/100)*c;
      let n=0; const num=document.getElementById('adhNum'); const iv=setInterval(()=>{ n+=Math.ceil(result.overall/25)||1; if(n>=result.overall){n=result.overall;clearInterval(iv);} if(num)num.textContent=n; },40); });
    NC.toast(t('adherenceCalculated')+': '+result.overall+'%', result.riskFlag?'warn':'success');
    loadTrend();
    document.getElementById('aRecalc').onclick=(e)=>NC.withLoading(e.target, runCalc);
    document.getElementById('aHistory').onclick=showAdhHistory;
    document.getElementById('aCompare').onclick=compareAdh;
    document.getElementById('aPdf').onclick=()=>exportAdhPdf(result);
    document.getElementById('aCsv').onclick=async()=>{ const h=await api('/patients/'+PID+'/adherence/history'); NC.exportCSV('adherence_history.csv', h.map(x=>({date:x.ts,overall:x.overall,food:x.food,exercise:x.exercise,medication:x.medication,lifestyle:x.lifestyle,category:x.category}))); };
    document.getElementById('aSend').onclick=async(e)=>NC.withLoading(e.target, async()=>{ await api('/messages/'+PID,{method:'POST',body:{body:`📊 Adherence report: ${result.overall}% (${result.category}). Food ${result.food}%, Exercise ${result.exercise}%, Meds ${result.medication}%, Lifestyle ${result.lifestyle}%.`}}); NC.toast(t('sentToDoctor'),'success'); });
  }
  async function showAdhHistory(){
    const h=await api('/patients/'+PID+'/adherence/history');
    const rows=h.slice().reverse().map(x=>`<tr><td>${new Date(x.ts).toLocaleDateString()}</td><td><span class="badge tier-${x.category==='High'?'low':x.category==='Medium'?'moderate':'critical'}">${x.overall}%</span></td><td>${x.food}/${x.exercise}/${x.medication}/${x.lifestyle}</td></tr>`).join('');
    NC.modal(`<table><thead><tr><th>Date</th><th>Score</th><th>F/E/M/L</th></tr></thead><tbody>${rows||`<tr><td colspan=3 class="muted">${t('noData')}</td></tr>`}</tbody></table>`, { title:t('viewHistory') });
  }
  async function compareAdh(){
    const h=await api('/patients/'+PID+'/adherence/history');
    if(h.length<2){ NC.toast(t('noData'),'warn'); return; }
    const cur=h[h.length-1], prev=h[h.length-2], d=cur.overall-prev.overall;
    NC.modal(`<div style="text-align:center"><div style="font-size:34px;font-weight:800;color:${d>=0?'var(--low)':'var(--critical)'}">${d>=0?'+':''}${d}%</div>
      <p>${t('latest')}: <b>${cur.overall}%</b> · ${t('previous')}: <b>${prev.overall}%</b></p>
      <p class="muted">${d>=0?t('improving'):t('declining')}</p></div>`, { title:t('compare') });
  }
  function exportAdhPdf(r){
    const w=window.open('','_blank');
    w.document.write(`<html><head><title>Adherence Report</title><style>body{font-family:Inter,sans-serif;padding:30px;max-width:700px;margin:auto;color:#1a2233}h1{color:#0d9488}.b{border:1px solid #e4e9f2;border-radius:12px;padding:14px;margin:10px 0}</style></head><body>
      <h1>NutriCare AI — Adherence Report</h1>
      <p><b>${esc(u.name)}</b> · ${esc(PID)} · ${new Date().toLocaleString()}</p>
      <div class="b"><h2>Overall: ${r.overall}% (${r.category})</h2></div>
      <div class="b">Food ${r.food}% · Exercise ${r.exercise}% · Medication ${r.medication}% · Lifestyle ${r.lifestyle}%</div>
      <div class="b"><h3>AI Insights</h3><ul>${r.insights.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>
      <p style="color:#64748b;font-size:12px">${esc(NC.t('disclaimer'))}</p></body></html>`);
    w.document.close(); setTimeout(()=>w.print(),400); NC.toast(t('reportExported'),'success');
  }

  async function plan(){
    const d = await api('/foods?limit=100&patientId='+PID);
    const eat = d.foods.filter(f=>!f.screen||f.screen.verdict==='allow').slice(0,12);
    const avoid = d.foods.filter(f=>f.screen&&f.screen.verdict!=='allow').slice(0,12);
    C.innerHTML = `<div class="card page"><h3 class="v-allow">✓ <span data-t="foodsToEat">Foods to favour</span></h3>
      <div class="row">${eat.map(f=>`<span class="chip">${esc(NC.getLang()==='ar'?(f.nameAr||f.name):f.name)}</span>`).join('')}</div></div>
      <div class="card page" style="margin-top:12px"><h3 class="v-avoid">✕ <span data-t="foodsToAvoid">Foods to avoid</span></h3>
      <div class="row">${avoid.map(f=>`<span class="chip" style="border-color:var(--avoid);color:var(--avoid)">${esc(NC.getLang()==='ar'?(f.nameAr||f.name):f.name)}</span>`).join('')||`<span class="muted">${t('noData')}</span>`}</div></div>`;
    NC.setLang(NC.getLang());
  }

  async function meds(){
    const lang = NC.getLang();
    const tx = (o) => o ? (lang==='ar'? (o.ar||o.en) : o.en) : '';
    const d = await api('/patients/'+PID+'/interactions');
    const sevColor = s => s==='high'?'var(--avoid)':s==='moderate'?'var(--caution)':'var(--muted)';
    C.innerHTML = `<div class="card page">
        <h3>💊 <span data-t="interactions">Interactions & Reminders</span></h3>
        <div class="muted" style="font-size:13px">${esc(d.medications||t('noMeds'))}</div>
      </div>
      ${d.combinedAlerts.map(a=>`<div class="card page" style="margin-top:12px;border-color:var(--avoid)">
        <b class="v-avoid">⚠️ ${esc(tx(a))}</b></div>`).join('')}
      <div class="card page" style="margin-top:12px">
        <h3 class="v-avoid">⚠️ <span data-t="foodDrug">Food–drug warnings</span></h3>
        ${d.warnings.length? d.warnings.map(w=>`<div class="explain" style="border-color:${sevColor(w.severity)}">
          <b>${esc(w.drug)}</b> — ${esc(tx(w.food))}
          <div class="muted" style="font-size:12px">${esc(tx(w.risk))}</div>
          <span class="chip" style="border-color:${sevColor(w.severity)};color:${sevColor(w.severity)};font-size:11px">${t(w.severity)||w.severity}</span>
        </div>`).join('') : `<p class="muted" data-t="noInteractions">No known interactions.</p>`}
      </div>
      <div class="card page" style="margin-top:12px">
        <h3>⏰ <span data-t="medReminders">Medication reminders</span></h3>
        ${d.reminders.length? d.reminders.map(r=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)">
          <div><b>${esc(r.drug)}</b><div class="muted" style="font-size:12px">${esc(r.class||'')}</div></div>
          <div style="text-align:end;font-size:13px;max-width:55%">${esc(tx(r.reminder))}</div></div>`).join('') : `<p class="muted" data-t="noMeds">No medications.</p>`}
      </div>
      <p class="disclaimer" data-t="disclaimer"></p>`;
    NC.setLang(lang);
  }

  async function logPage(){
    C.innerHTML = `<div class="card page"><h3 data-t="logFood">Log Food</h3>
      <input id="fs" data-tph="search"/><div id="res" style="margin-top:10px"></div></div>`;
    NC.setLang(NC.getLang());
    const load = async()=>{
      const d = await api('/foods?limit=30&patientId='+PID+'&search='+encodeURIComponent(document.getElementById('fs').value));
      document.getElementById('res').innerHTML = d.foods.map(f=>{const s=f.screen||{verdict:'allow',violations:[]};
        const vc=s.verdict==='avoid'?'v-avoid':s.verdict==='caution'?'v-caution':'v-allow';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
          <div><b>${esc(NC.getLang()==='ar'?(f.nameAr||f.name):f.name)}</b> <span class="muted" style="font-size:12px">${f.kcal} kcal</span>
          <div class="${vc}" style="font-size:12px">${s.verdict.toUpperCase()}${s.violations[0]?' · '+esc(s.violations[0].rule):''}</div></div>
          <button class="btn btn-sm" onclick="logFood('${f.id}','${esc(f.name)}',${f.kcal})">+</button></div>`;}).join('');
    };
    document.getElementById('fs').oninput = load; load();
  }
  window.logFood = async(id,name,kcal)=>{ await api('/patients/'+PID+'/food',{method:'POST',body:{foodName:name,grams:100,kcal,meal:'snack'}}); alert(t('logFood')+' ✓'); };

  function assistant(){
    C.innerHTML = `<div class="card page"><h3>🤖 <span data-t="assistant">AI Assistant</span></h3>
      <div id="chat" style="max-height:50vh;overflow:auto;margin:8px 0"></div>
      <div class="row" style="gap:6px"><input id="ai" data-tph="askAI" class="grow"/><button class="btn btn-primary btn-sm" id="ask" data-t="send">Send</button></div>
      <p class="disclaimer" data-t="disclaimer"></p></div>`;
    NC.setLang(NC.getLang());
    const chat = document.getElementById('chat');
    const ask = async()=>{
      const v=document.getElementById('ai').value.trim(); if(!v) return;
      chat.innerHTML += `<div class="msg patient">${esc(v)}</div>`; document.getElementById('ai').value='';
      const r = await api('/assistant',{method:'POST',body:{message:v,lang:NC.getLang(),patientId:PID}});
      chat.innerHTML += `<div class="msg physician">${esc(r.reply)}${r.sources&&r.sources[0]?`<div class="src" style="font-size:11px;opacity:.7;margin-top:4px">📖 ${esc(r.sources[0])}</div>`:''}</div>`;
      chat.scrollTop = chat.scrollHeight;
    };
    document.getElementById('ask').onclick = ask;
    document.getElementById('ai').addEventListener('keydown',e=>{if(e.key==='Enter')ask();});
  }

  function messages(){
    C.innerHTML = `<div class="card page"><h3 data-t="messages">Messages</h3>
      <div id="mlist" style="max-height:55vh;overflow:auto"></div>
      <div class="row" style="gap:6px;margin-top:8px"><input id="mi" data-tph="typeMessage" class="grow"/><button class="btn btn-primary btn-sm" id="ms" data-t="send">Send</button></div></div>`;
    NC.setLang(NC.getLang()); loadMsgs();
    document.getElementById('ms').onclick = async()=>{ const v=document.getElementById('mi').value.trim(); if(!v)return; await api('/messages/'+PID,{method:'POST',body:{body:v}}); document.getElementById('mi').value=''; loadMsgs(); };
  }
  async function loadMsgs(){
    const m = await api('/messages/'+PID);
    const el = document.getElementById('mlist'); if(!el) return;
    el.innerHTML = m.map(x=>`<div class="msg ${x.sender==='patient'?'patient':'physician'}">${esc(x.body)}</div>`).join('')||`<p class="muted">${t('noData')}</p>`;
    el.scrollTop = el.scrollHeight;
  }

  load();
  </script>
</body>
</html>
