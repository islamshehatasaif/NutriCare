<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriCare AI · Ghidhā'ī</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card card glass">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div class="brand" style="padding:0"><div class="logo">غ</div><span data-t="appName">NutriCare AI</span></div>
        <div class="row" style="gap:6px">
          <button class="btn btn-sm" id="langBtn">العربية</button>
          <button class="btn btn-sm" id="themeBtn">🌙</button>
        </div>
      </div>
      <p class="muted" data-t="tagline" style="margin-top:0">Clinical & Lifestyle Nutrition</p>

      <div class="tabs">
        <button class="active" id="tabLogin" data-t="login">Sign in</button>
        <button id="tabReg" data-t="register">Create account</button>
      </div>

      <form id="loginForm">
        <div class="field"><label data-t="email">Email</label><input type="email" id="liEmail" value="doctor@nutricare.sa" required /></div>
        <div class="field"><label data-t="password">Password</label><input type="password" id="liPass" value="docpass123" required /></div>
        <button class="btn btn-primary" style="width:100%" type="submit" data-t="login">Sign in</button>
        <p id="liErr" class="v-avoid" style="font-size:13px;margin:10px 0 0"></p>
        <p style="margin:14px 0 0;font-size:13px" class="muted">
          Physician: <b>doctor@nutricare.sa</b> / docpass123<br/>
          Patient: <b>ahmed.eltayeb@auc.edu</b> / password123
        </p>
      </form>

      <form id="regForm" class="hidden">
        <div class="field"><label data-t="name">Full name</label><input id="rName" required /></div>
        <div class="field"><label data-t="email">Email</label><input type="email" id="rEmail" required /></div>
        <div class="field"><label data-t="password">Password</label><input type="password" id="rPass" required /></div>
        <div class="row">
          <div class="field grow"><label data-t="role">Role</label>
            <select id="rRole"><option value="patient" data-t="patient">Patient</option><option value="physician" data-t="physician">Physician</option></select>
          </div>
          <div class="field grow"><label>Date of birth</label><input type="date" id="rDob" /></div>
        </div>
        <button class="btn btn-primary" style="width:100%" type="submit" data-t="register">Create account</button>
        <p id="rErr" class="v-avoid" style="font-size:13px;margin:10px 0 0"></p>
      </form>

      <p class="disclaimer" data-t="disclaimer">AI supports — never replaces.</p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const { t, setLang, getLang, toggleTheme, api } = NC;
    function go(u) {
      NC.setAuth(u.token, u.user);
      location.href = u.user.role === 'patient' ? '/patient.html' : '/physician.html';
    }
    langBtn.onclick = () => { const n = getLang() === 'en' ? 'ar' : 'en'; setLang(n); langBtn.textContent = n === 'en' ? 'العربية' : 'English'; };
    themeBtn.onclick = toggleTheme;
    tabLogin.onclick = () => { tabLogin.classList.add('active'); tabReg.classList.remove('active'); loginForm.classList.remove('hidden'); regForm.classList.add('hidden'); };
    tabReg.onclick = () => { tabReg.classList.add('active'); tabLogin.classList.remove('active'); regForm.classList.remove('hidden'); loginForm.classList.add('hidden'); };
    loginForm.onsubmit = async (e) => {
      e.preventDefault(); liErr.textContent = '';
      try { go(await api('/auth/login', { method: 'POST', body: { email: liEmail.value, password: liPass.value } })); }
      catch { liErr.textContent = t('invalidLogin'); }
    };
    regForm.onsubmit = async (e) => {
      e.preventDefault(); rErr.textContent = '';
      try { go(await api('/auth/register', { method: 'POST', body: { name: rName.value, email: rEmail.value, password: rPass.value, role: rRole.value, birthday: rDob.value } })); }
      catch (err) { rErr.textContent = err.message; }
    };
    if (NC.token() && NC.user()) location.href = NC.user().role === 'patient' ? '/patient.html' : '/physician.html';
  </script>
</body>
</html>
